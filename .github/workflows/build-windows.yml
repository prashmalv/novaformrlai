name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'          # v1.0, v1.1 etc. push karo to auto-build
  workflow_dispatch:  # Manual trigger bhi kar sakte ho GitHub UI se

jobs:
  build-windows:
    runs-on: windows-latest   # GitHub ka Windows machine use hoga

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --name "NovoForm" ^
            --windowed ^
            --onedir ^
            --add-data "config;config" ^
            --hidden-import "reportlab.graphics" ^
            --hidden-import "reportlab.platypus" ^
            --hidden-import "ezdxf" ^
            --hidden-import "matplotlib.backends.backend_agg" ^
            --hidden-import "PyQt6.QtPrintSupport" ^
            --hidden-import "PyQt6.sip" ^
            main.py

      - name: Create ZIP of dist folder
        run: |
          cd dist
          Compress-Archive -Path NovoForm -DestinationPath NovoForm-Windows.zip
        shell: powershell

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovoForm-Windows
          path: dist/NovoForm-Windows.zip
          retention-days: 30    # 30 din tak download kar sakte ho

      # Agar tag push kiya (v1.0 etc.) to GitHub Release bhi ban jata hai
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NovoForm-Windows.zip
          name: "NovoForm ${{ github.ref_name }}"
          body: |
            NovoForm Formwork Analysis & BOQ Generator

            **Installation:**
            1. ZIP extract karo
            2. NovoForm folder open karo
            3. NovoForm.exe double-click karo

            No Python installation required.
